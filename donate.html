<!doctype html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Support</title>
<link rel="icon" type="image/svg+xml" href="umbrella.svg" />

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#f6f7f9;
    color:#111;
}

.wrap{
    max-width:900px;
    margin:auto;
    padding:60px 20px;
}

/* top */
.topbar{
    display:flex;
    justify-content:flex-end;
    margin-bottom:20px;
}

button.lang{
    border:1px solid #ddd;
    background:#fff;
    padding:6px 12px;
    border-radius:10px;
    cursor:pointer;
    margin-left:8px;
}

/* hero */
.hero{
    text-align:center;
    margin-bottom:50px;
}

.hero h1{
    font-size:32px;
    margin-bottom:12px;
}

.desc{
    color:#666;
    line-height:1.8;
    max-width:720px;
    margin:auto;
}

/* grid */
.grid{
    display:flex;
    gap:30px;
    justify-content:center;
    flex-wrap:wrap;
}

.card{
    width:300px;
    background:#fff;
    border-radius:20px;
    padding:26px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    transition:.25s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 18px 50px rgba(0,0,0,.12);
}

.card img{
    width:220px;
    border-radius:12px;
    margin-top:14px;
}

.tip{
    margin-top:12px;
    color:#777;
    font-size:14px;
}

/* footer */
.footer{
    text-align:center;
    margin-top:50px;
    color:#888;
    font-size:14px;
}

@media (prefers-color-scheme:dark){
    body{ background:#0f1115; color:#eee; }
    .card{ background:#1b1d22; }
    .desc{ color:#aaa; }
    button.lang{
        background:#1b1d22;
        border-color:#333;
        color:#eee;
    }
}
</style>
</head>

<body>

<div class="wrap">

    <div class="topbar">
        <button class="lang" onclick="setLang('en')">EN</button>
        <button class="lang" onclick="setLang('zh')">中文</button>
    </div>

    <div class="hero">
        <h1 data-i18n="title"></h1>
        <div class="desc" data-i18n="desc"></div>
    </div>

    <!-- payment -->
    <div class="grid" id="grid"></div>

    <div class="footer" data-i18n="footer"></div>

</div>

<script>

const dict = {
    en:{
        title:"❤️ Support Colorful Background",
        desc:`If Colorful Background makes your browsing experience more enjoyable,
your support helps keep the project growing.

Every contribution helps with:
✨ New themes and visual improvements
🚀 New features and updates
🛠 Bug fixes and maintenance
👁 Eye comfort improvements`,
        footer:"Thank you for supporting independent development ☕"
    },

    zh:{
        title:"❤️ 支持 Colorful Background",
        desc:`如果 Colorful Background 让你的浏览体验更愉快，
你的支持将帮助项目持续成长。

每一份支持都会帮助：
✨ 新主题与视觉优化
🚀 新功能与持续更新
🛠 Bug 修复与维护
👁 护眼体验优化`,
        footer:"感谢支持独立开发 ☕"
    }
};

/**
 * 支付方式配置（核心逻辑）
 */
const payments = {
    en: [
        {
            title:"💛 PayPal",
            tip:"Donate with PayPal",
            img:"https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg"
        }
    ],
    zh: [
        {
            title:"💚 微信",
            tip:"使用微信扫码",
            img:"https://ext-colorful.github.io/images/wechat.jpg"
        },
        {
            title:"💙 支付宝",
            tip:"使用支付宝扫码",
            img:"https://ext-colorful.github.io/images/alipay.jpg"
        }
    ]
};

function render(lang){

    // 文案
    document.querySelectorAll("[data-i18n]").forEach(el=>{
        const key = el.getAttribute("data-i18n");
        el.innerText = dict[lang][key];
    });

    // 支付方式
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    payments[lang].forEach(p=>{
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h2>${p.title}</h2>
            <img src="${p.img}" />
            <div class="tip">${p.tip}</div>
        `;

        grid.appendChild(card);
    });

    localStorage.setItem("lang", lang);
}

function setLang(lang){
    render(lang);
}

// init
render(localStorage.getItem("lang") || "en");

</script>

</body>
</html>
